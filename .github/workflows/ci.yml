name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run backend tests
        run: mvn -pl erp-admin,erp-inventory,erp-purchase,erp-sales,erp-production -am test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: erp-frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @erp/web build
      - name: Smoke web
        run: pnpm --filter @erp/web smoke
      - name: Typecheck mobile shell
        run: pnpm --filter @erp/mobile exec tsc --noEmit
      - name: Typecheck desktop shell
        run: pnpm --filter @erp/desktop exec tsc --noEmit
