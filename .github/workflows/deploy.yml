name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: '跳过构建，只重新部署当前 ECS 上的产物'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- 构建后端 ---
      - name: Build backend JAR
        if: inputs.skip_build != true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build backend
        if: inputs.skip_build != true
        run: mvn -f erp-server/pom.xml clean package -DskipTests -q

      # --- 构建前端 ---
      - name: Setup frontend
        if: inputs.skip_build != true
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Setup node
        if: inputs.skip_build != true
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        if: inputs.skip_build != true
        working-directory: erp-frontend
        run: pnpm install
      - name: Build frontend
        if: inputs.skip_build != true
        working-directory: erp-frontend
        run: pnpm --filter @erp/web build

      # --- 部署到 ECS ---
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload artifacts
        if: inputs.skip_build != true
        run: |
          scp -i ~/.ssh/deploy_key \
            erp-server/erp-admin/target/erp-admin-1.0.0-SNAPSHOT.jar \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/erp-admin.jar

          scp -i ~/.ssh/deploy_key \
            -r erp-frontend/apps/web/dist/* \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/dist/

          scp -i ~/.ssh/deploy_key \
            scripts/erp-admin.service \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/scripts/

          scp -i ~/.ssh/deploy_key \
            scripts/nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/scripts/

      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_EOF'
            chmod +x /opt/erp/scripts/deploy.sh 2>/dev/null || true
            cd /opt/erp && bash scripts/deploy.sh
          DEPLOY_EOF

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/deploy_key
