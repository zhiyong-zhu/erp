name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: '跳过构建，只重新部署当前 ECS 上的产物'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- 构建后端 ---
      - name: Setup Java
        if: inputs.skip_build != true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build backend
        if: inputs.skip_build != true
        run: mvn -f erp-server/pom.xml clean package -DskipTests -q

      # --- 构建前端 ---
      - name: Setup frontend
        if: inputs.skip_build != true
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Setup node
        if: inputs.skip_build != true
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        if: inputs.skip_build != true
        working-directory: erp-frontend
        run: pnpm install
      - name: Build frontend
        if: inputs.skip_build != true
        working-directory: erp-frontend
        run: pnpm --filter @erp/web build

      # --- 打包产物 ---
      - name: Package artifacts
        if: inputs.skip_build != true
        run: |
          # 打包前端为单个 tar.gz（比逐个 scp 文件快 10 倍）
          cd erp-frontend/apps/web/dist && tar czf /tmp/web-dist.tar.gz . && cd -
          # 后端 JAR 已在 target 目录

      # --- 部署到 ECS ---
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure remote directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /opt/erp/{backend,logs,backups,scripts,dist,tmp} /usr/share/erp/web"

      - name: Upload deploy script
        run: |
          scp -i ~/.ssh/deploy_key scripts/deploy.sh \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/scripts/deploy.sh
          scp -i ~/.ssh/deploy_key scripts/erp-admin.service \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/scripts/erp-admin.service
          scp -i ~/.ssh/deploy_key scripts/nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/scripts/nginx.conf

      - name: Upload backend JAR
        if: inputs.skip_build != true
        run: |
          scp -i ~/.ssh/deploy_key \
            erp-server/erp-admin/target/erp-admin-1.0.0-SNAPSHOT.jar \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/erp-admin.jar

      - name: Upload frontend package
        if: inputs.skip_build != true
        run: |
          scp -i ~/.ssh/deploy_key /tmp/web-dist.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/erp/web-dist.tar.gz

      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_EOF'
            bash /opt/erp/scripts/deploy.sh
          DEPLOY_EOF

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/deploy_key
