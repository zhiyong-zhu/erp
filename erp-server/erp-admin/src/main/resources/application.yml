spring:
  application:
    name: erp-admin
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_db
    username: erp_user
    password: erp_password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.xml
  jackson:
    time-zone: Asia/Shanghai

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

erp:
  security:
    jwt-secret: erp-dev-secret-key-please-change-123456
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 604800
  storage:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: admin123456
    bucket: erp-dev

flowable:
  database-schema-update: false
  async-executor-activate: true

xxl:
  job:
    enabled: false
